name: WhisperTranscriptionApp
options:
  developmentLanguage: en
targets:
  WhisperTranscriptionApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Shared
        createIntermediateGroups: true
      - path: Sources/WhisperTranscriptionApp
        createIntermediateGroups: true
      - path: Resources
        createIntermediateGroups: true
      - path: PrivacyInfo.xcprivacy
      - path: WhisperTranscriptionApp-Bridging-Header.h
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.porarrirr.offlinewhispertranscriber
        SWIFT_VERSION: "5.9"
        SWIFT_OBJC_BRIDGING_HEADER: WhisperTranscriptionApp-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/whisper.cpp/include"
          - "$(SRCROOT)/whisper.cpp/ggml/include"
          - "$(SRCROOT)/whisper.cpp/src/coreml"
        OTHER_LDFLAGS: "-lc++ -lz"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        DEVELOPMENT_TEAM: 77V64TWCFD
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        MARKETING_VERSION: "1.3"
        CURRENT_PROJECT_VERSION: "2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Whisper Transcriber
        CFBundleDevelopmentRegion: en
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSMicrophoneUsageDescription: "Microphone access is required to record audio for transcription."
        NSSpeechRecognitionUsageDescription: "Speech recognition is required to transcribe audio on device."
        NSSupportsLiveActivities: true
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
    dependencies:
      - framework: Frameworks/whisper.xcframework
        embed: true
        codeSign: true
      - sdk: AVFoundation.framework
      - sdk: UniformTypeIdentifiers.framework
      - sdk: PhotosUI.framework
      - sdk: AppIntents.framework
      - sdk: ActivityKit.framework
      - sdk: Speech.framework
      - target: RecordingActivityWidget
        embed: true
    scheme:
      testTargets:
        - WhisperTranscriptionAppTests
  WhisperTranscriptionAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/WhisperTranscriptionAppTests
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.porarrirr.offlinewhispertranscriber.tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/whisper.cpp/include"
          - "$(SRCROOT)/whisper.cpp/ggml/include"
          - "$(SRCROOT)/whisper.cpp/src/coreml"
        OTHER_LDFLAGS: "-lc++ -lz"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/WhisperTranscriptionApp.app/WhisperTranscriptionApp"
        BUNDLE_LOADER: "$(TEST_HOST)"
        DEVELOPMENT_TEAM: 77V64TWCFD
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    dependencies:
      - target: WhisperTranscriptionApp
  RecordingActivityWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/RecordingActivityWidget
        createIntermediateGroups: true
      - path: Sources/Shared
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.porarrirr.offlinewhispertranscriber.recordingactivity
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_LANGUAGE: en
        MARKETING_VERSION: "1.3"
        CURRENT_PROJECT_VERSION: "2"
        DEVELOPMENT_TEAM: 77V64TWCFD
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        APPLICATION_EXTENSION_API_ONLY: YES
        INFOPLIST_FILE: Sources/RecordingActivityWidget/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    dependencies:
      - sdk: ActivityKit.framework
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
