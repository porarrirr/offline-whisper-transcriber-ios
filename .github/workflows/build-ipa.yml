name: Build Unsigned IPA

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Generate Xcode project
        run: |
          chmod +x SilentCamera/generate_project.sh
          cd SilentCamera && ./generate_project.sh

      - name: Build App
        run: |
          xcodebuild \
            -project SilentCamera/SilentCamera.xcodeproj \
            -scheme SilentCamera \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            ENABLE_BITCODE=NO

      - name: Create IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -R build/DerivedData/Build/Products/Release-iphoneos/SilentCamera.app build/ipa/Payload/
          cd build/ipa
          zip -r SilentCamera-unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SilentCamera-unsigned
          path: build/ipa/SilentCamera-unsigned.ipa

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/ipa/SilentCamera-unsigned.ipa
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
