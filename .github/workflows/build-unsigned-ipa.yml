name: Build unsigned IPA

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15

    defaults:
      run:
        working-directory: WhisperTranscriptionApp

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build archive without signing
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project WhisperTranscriptionApp.xcodeproj \
            -scheme WhisperTranscriptionApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/build/WhisperTranscriptionApp.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="$PWD/build/WhisperTranscriptionApp.xcarchive/Products/Applications/WhisperTranscriptionApp.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App bundle was not found: $APP_PATH" >&2
            exit 1
          fi

          rm -rf "$PWD/build/Payload"
          mkdir -p "$PWD/build/Payload"
          cp -R "$APP_PATH" "$PWD/build/Payload/"
          find "$PWD/build/Payload" -name "_CodeSignature" -type d -prune -exec rm -rf {} +
          find "$PWD/build/Payload" -name "embedded.mobileprovision" -type f -delete
          rm -rf "$PWD/build/Payload/WhisperTranscriptionApp.app/Metadata.appintents"
          ditto -c -k --keepParent "$PWD/build/Payload" "$PWD/build/WhisperTranscriptionApp-unsigned.ipa"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperTranscriptionApp-unsigned-ipa
          path: WhisperTranscriptionApp/build/WhisperTranscriptionApp-unsigned.ipa

      - name: Attach IPA to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: WhisperTranscriptionApp/build/WhisperTranscriptionApp-unsigned.ipa
          generate_release_notes: true
